<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Tip</title>
</head>
<body>

<h2>Edit Tip</h2>

<form method="post" th:action="@{/tips/update/{id}(id=${tip.id})}">

    <input type="hidden" name="id" th:value="${tip.id}"/>

    <label>Title</label><br>
    <input type="text" name="title" th:value="${tip.title}" required style="width:400px;"><br><br>

    <label>Description</label><br>
    <textarea name="description" rows="5" style="width:400px;" th:text="${tip.description}"></textarea><br><br>

    <label>Category</label><br>
    <input type="text" name="category" th:value="${tip.category}" style="width:400px;"><br><br>

    <label>Image URL</label><br>
    <input type="text" name="imageUrl" th:value="${tip.imageUrl}" style="width:400px;"><br><br>

    <label>Audio URL</label><br>
    <input type="text" name="audioUrl" th:value="${tip.audioUrl}" style="width:400px;"><br><br>

    <label>YouTube URL</label><br>
    <input type="text" name="youtubeUrl" th:value="${tip.youtubeUrl}" style="width:400px;"><br><br>

    <label>
        <input type="checkbox" name="featured" th:checked="${tip.featured}" /> Featured Tip
    </label>

    <br><br>

    <button type="submit">Update</button>

</form>

</body>
</html>
