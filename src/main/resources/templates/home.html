<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ShubhGyan Admin - Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .container { padding: 20px; margin-left: 240px; }
        .card { background:#f9fafb; padding:15px; border-radius:6px; margin-bottom:10px; }
        a.button { display:inline-block; padding:10px 14px; background:#2563eb; color:white; text-decoration:none; border-radius:4px; margin:6px 0; }
    </style>
</head>
<body>

    <div th:replace="fragments/header :: header"></div>
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="container">
        <h1>ShubhGyan Admin</h1>

        <div class="card">
            <p>Quick actions:</p>
            <p>
                <a class="button" th:href="@{/tips}">View All Tips</a>
                <a class="button" th:href="@{/tips/create}">Create Tip</a>
                <a class="button" th:href="@{/tips/download-json}">Download JSON</a>
                <a class="button" th:href="@{/upload}">Upload JSON</a>
            </p>
        </div>

        <div class="card">
            <h3>About</h3>
            <p>This is the admin dashboard for ShubhGyan. Use the links above to manage tips.</p>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>

</body>
</html>
